      run: sshpass -p "$TEST_RUNNER_PASS_NEW" ssh -o StrictHostKeyChecking=no -p $TEST_RUNNER_PORT_NEW $TEST_RUNNER_USER_NEW@$TEST_RUNNER_HOST_NEW "killall -q qemu-system-aarch64 2>/dev/null || true; rm -rf /tmp/pam_usb_qemu_* || true"
    - name: Ensure arm64 checkout and .deb exist (rerun resilience)
      env:
        TEST_RUNNER_HOST_NEW: ${{ secrets.TEST_RUNNER_HOST_NEW }}
        TEST_RUNNER_USER_NEW: ${{ secrets.TEST_RUNNER_USER_NEW }}
        TEST_RUNNER_PASS_NEW: ${{ secrets.TEST_RUNNER_PASS_2025 }}
        TEST_RUNNER_PORT_NEW: ${{ secrets.TEST_RUNNER_PORT_NEW }}
        REF_TO_CHECKOUT: ${{ github.head_ref }}
      run: sshpass -p "$TEST_RUNNER_PASS_NEW" ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=10 -p $TEST_RUNNER_PORT_NEW $TEST_RUNNER_USER_NEW@$TEST_RUNNER_HOST_NEW "ls ~/pam_usb_deb_arm64_$GITHUB_RUN_ID/.build/libpam-usb_*_arm64.deb > /dev/null 2>&1 || (sudo rm -rf ~/pam_usb_deb_arm64_$GITHUB_RUN_ID && git clone https://github.com/mcdope/pam_usb.git ~/pam_usb_deb_arm64_$GITHUB_RUN_ID && cd ~/pam_usb_deb_arm64_$GITHUB_RUN_ID && { git switch -f $REF_TO_CHECKOUT || git switch -f master; } && git pull && make buildenv-debian-arm64 && make build-debian-arm64)"
    - name: Check arm64 QEMU golden image exists
      id: check_image_arm64
      env:
        TEST_RUNNER_HOST_NEW: ${{ secrets.TEST_RUNNER_HOST_NEW }}
        TEST_RUNNER_USER_NEW: ${{ secrets.TEST_RUNNER_USER_NEW }}
        TEST_RUNNER_PASS_NEW: ${{ secrets.TEST_RUNNER_PASS_2025 }}
        TEST_RUNNER_PORT_NEW: ${{ secrets.TEST_RUNNER_PORT_NEW }}
      run: |
        sshpass -p "$TEST_RUNNER_PASS_NEW" ssh -o StrictHostKeyChecking=no -p $TEST_RUNNER_PORT_NEW $TEST_RUNNER_USER_NEW@$TEST_RUNNER_HOST_NEW "
          PROVISION_VERSION=\$(grep -A1 'arm64)' ~/pam_usb_deb_arm64_$GITHUB_RUN_ID/tests/can-actually-be-used/run-tests-in-qemu.sh | grep 'PROVISION_VERSION=' | cut -d'\"' -f2)
          CACHE=\"\$HOME/.cache/pam_usb-qemu\"
          test -f \"\${CACHE}/jammy-arm64-provisioned-v\${PROVISION_VERSION}.qcow2\" \
            && test -f \"\${CACHE}/jammy-arm64-key-v\${PROVISION_VERSION}\" \
            || { echo \"Error: golden image not found for arm64 (v\${PROVISION_VERSION}). Run 'make provision-qemu-images' on the CI runner first.\" >&2; exit 1; }
        "
