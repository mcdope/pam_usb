name: Unit tests

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  unit-tests:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        uses: ./.github/actions/install-build-deps
        with:
          extra-packages: libcmocka-dev python3-pytest python3-pytest-mock

      - name: Build object files
        run: make src/xpath.o src/conf.o src/mem.o src/log.o src/process.o src/remote_services.o src/evdev.o

      - name: Run C unit tests
        run: make test-c

      - name: Run Python unit tests
        run: make test-python
