name: Unit tests

on:
  workflow_run:
    workflows: ["Can be built successfully"]
    types: [completed]

jobs:
  check-prerequisite:
    runs-on: ubuntu-22.04
    steps:
      - name: Fail if upstream workflow failed
        if: ${{ github.event.workflow_run.conclusion != 'success' }}
        run: |
          echo "Upstream workflow '${{ github.event.workflow_run.name }}' did not succeed (conclusion: ${{ github.event.workflow_run.conclusion }})"
          exit 1

  unit-tests:
    needs: check-prerequisite
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libcmocka-dev \
            libxml2-dev \
            libudisks2-dev \
            libglib2.0-dev \
            libpam0g-dev \
            python3-pytest \
            python3-pytest-mock

      - name: Build object files
        run: make src/xpath.o src/conf.o src/mem.o src/log.o src/process.o

      - name: Run C unit tests
        run: make test-c

      - name: Run Python unit tests
        run: make test-python
