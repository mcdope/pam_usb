      run: sshpass -p "$TEST_RUNNER_PASS_NEW" ssh -tt -o StrictHostKeyChecking=no -p $TEST_RUNNER_PORT_NEW $TEST_RUNNER_USER_NEW@$TEST_RUNNER_HOST_NEW "sudo rm -rf ~/pam_usb_qemu_armhf_$GITHUB_RUN_ID; docker rmi -f mcdope/pam_usb-ubuntu-armhf-build 2>/dev/null || true; docker image prune -f"
