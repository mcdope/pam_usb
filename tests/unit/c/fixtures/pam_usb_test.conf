<?xml version="1.0" encoding="UTF-8"?>
<configuration>
	<devices>
		<device id="stick1">
			<vendor>TestVendor</vendor>
			<model>TestModel</model>
			<serial>SERIAL001</serial>
			<volume_uuid>1111-AAAA</volume_uuid>
		</device>
		<device id="stick2">
			<vendor>SuperVendor</vendor>
			<model>SuperModel</model>
			<serial>SERIAL002</serial>
			<volume_uuid>2222-BBBB</volume_uuid>
		</device>
		<device id="stick3">
			<vendor>Generic</vendor>
			<model>Generic</model>
			<serial>SERIAL003</serial>
			<volume_uuid>3333-CCCC</volume_uuid>
		</device>
	</devices>
	<users>
		<user id="user_mixed">
			<device>stick1</device>
			<device superuser="true">stick2</device>
		</user>
		<user id="user_plain">
			<device>stick1</device>
		</user>
		<user id="user_generic">
			<device>stick3</device>
		</user>
	</users>
	<services>
		<service id="sudo">
			<option name="superuser">true</option>
		</service>
	</services>
</configuration>
